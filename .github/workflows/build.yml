Name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake nasm mingw-w64

      - name: configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_SYSTEM_NAME=Windows -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++

      - name: build
        run: cmake --build build -j$(nproc)

      - name: check artifact
        run: |
          test -f build/libarena.a
          test -f build/arena_link_test.exe

      - name: check archive
        run: |
          x86_64-w64-mingw32-objdump -f build/CMakeFiles/arena.dir/src/memory.cpp.obj | grep -q "pe-x86-64"
          x86_64-w64-mingw32-nm build/libarena.a | grep -q " T arena_read_safe"
          x86_64-w64-mingw32-nm build/libarena.a | grep -q " T arena_scan_signature_ex"
          x86_64-w64-mingw32-nm build/libarena.a | grep -q " T arena_call_ret_spoofed_ex"

      - name: upload lib
        uses: actions/upload-artifact@v4
        with:
          name: libarena-windows-x64
          path: |
            build/libarena.a
            build/arena_link_test.exe