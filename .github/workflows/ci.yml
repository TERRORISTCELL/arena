name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NASM
        run: choco install nasm -y

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run link test
        run: .\build\Release\arena_link_test.exe

      - name: Run lib verify
        run: .\build\Release\arena_lib_verify.exe
